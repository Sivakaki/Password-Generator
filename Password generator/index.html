<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Genarator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
        <h2>Password Generator</h2>
        <input type="text" id="text-box" placeholder="Generated Password Will appear Here" readonly>
        <div class="buttons">
        <button id="weak">Weak Password</button>
        <button id="strong">Strong Password</button>
        <button id="very">Very Strong Password</button>
        <button id="funny">Funny Password</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
